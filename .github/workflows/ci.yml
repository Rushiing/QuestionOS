name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: v0.2/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: v0.2/backend/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: ruff check app tests
      - run: pytest -q

  java-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: java-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - run: mvn -DskipTests compile
      - run: mvn test

  frontend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: v0.2/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: v0.2/frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  core-smoke:
    runs-on: ubuntu-latest
    needs: [java-checks, frontend-checks]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: v0.2/frontend/package-lock.json
      - run: npm ci
        working-directory: v0.2/frontend
      - run: npm run build
        working-directory: v0.2/frontend
      - run: bash scripts/ci-core-smoke.sh
