# Railway/容器：必须监听 0.0.0.0 与 $PORT，否则边缘会 502「Application failed to respond」
server:
  port: ${PORT:8080}
  address: 0.0.0.0

spring:
  application:
    name: questionos-java-backend

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

questionos:
  auth:
    sandbox-token: ${QUESTIONOS_SANDBOX_TOKEN:sk-sandbox-dev}
    google:
      client-id: ${QUESTIONOS_GOOGLE_CLIENT_ID:}
  cors:
    # 逗号分隔；生产请加公网入口，例如 http://47.253.98.164
    allowed-origins: ${QUESTIONOS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
  limits:
    maxMessagesPerMinute: 30
    maxSessionsPerToken: 20

  # 本地真实调用 LLM（用于：当未接入任何三方 agents 时，仍能让内置四角色正常沙盘推演）
  # 你可以把 endpoint 配成 OpenAI 或 OpenAI-compatible 的聊天补全接口：
  # - 例如 OpenAI：https://api.openai.com
  # - 或已经带 /v1/chat/completions：https://xxx/v1/chat/completions
  llm:
    endpoint: ${QUESTIONOS_LLM_ENDPOINT:}
    apiKey: ${QUESTIONOS_LLM_API_KEY:}
    model: ${QUESTIONOS_LLM_MODEL:}
    # 思维校准追问带摘录、线上网络与 GLM 首包可能较慢；默认 240s，仍超时可再在环境变量中加大
    timeoutSeconds: ${QUESTIONOS_LLM_TIMEOUT_SECONDS:240}
    # 部分 OpenAI 兼容网关要求显式 max_tokens；过小会截断 JSON，过大由网关自行约束
    maxTokens: ${QUESTIONOS_LLM_MAX_TOKENS:4096}
    # 仅对 DashScope / 百炼兼容域名自动附加 extra_body.enable_thinking（默认 false，避免思维链拖慢首包）
    extraBodyEnableThinking: ${QUESTIONOS_LLM_EXTRA_BODY_ENABLE_THINKING:false}
