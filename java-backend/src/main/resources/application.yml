server:
  port: 8080

spring:
  application:
    name: questionos-java-backend

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

questionos:
  auth:
    sandbox-token: sk-sandbox-dev
  cors:
    # 逗号分隔；生产请加公网入口，例如 http://47.253.98.164
    allowed-origins: http://localhost:3000,http://127.0.0.1:3000
  limits:
    maxMessagesPerMinute: 30
    maxSessionsPerToken: 20
